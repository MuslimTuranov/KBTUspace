basePath: /api/v1
definitions:
  models.AdminUpdateUserInput:
    properties:
      faculty_id:
        type: integer
      is_banned:
        type: boolean
      role:
        enum:
        - student
        - organizer
        - admin
        type: string
    type: object
  models.CloseReportInput:
    properties:
      review_note:
        maxLength: 1000
        minLength: 3
        type: string
      status:
        enum:
        - closed
        - rejected
        type: string
    required:
    - review_note
    - status
    type: object
  models.CreateEventInput:
    properties:
      capacity:
        maximum: 10000
        minimum: 1
        type: integer
      description:
        maxLength: 5000
        minLength: 10
        type: string
      event_date:
        type: string
      faculty_id:
        type: integer
      image_url:
        type: string
      location:
        maxLength: 255
        minLength: 3
        type: string
      scope:
        enum:
        - faculty
        - global
        type: string
      title:
        maxLength: 255
        minLength: 3
        type: string
    required:
    - capacity
    - description
    - event_date
    - location
    - title
    type: object
  models.CreatePostInput:
    properties:
      content:
        maxLength: 5000
        minLength: 10
        type: string
      faculty_id:
        type: integer
      image_url:
        type: string
      scope:
        enum:
        - faculty
        - global
        type: string
      title:
        maxLength: 255
        minLength: 3
        type: string
    required:
    - content
    - title
    type: object
  models.CreateReportInput:
    properties:
      reason:
        maxLength: 1000
        minLength: 3
        type: string
      target_id:
        minimum: 1
        type: integer
      target_type:
        enum:
        - post
        - event
        type: string
    required:
    - reason
    - target_id
    - target_type
    type: object
  models.Faculty:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  models.LoginInput:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  models.PinPostInput:
    properties:
      is_pinned:
        type: boolean
    type: object
  models.Post:
    properties:
      approved_at:
        type: string
      approved_by:
        type: integer
      author_id:
        type: integer
      capacity:
        type: integer
      content:
        type: string
      created_at:
        type: string
      current_count:
        type: integer
      event_date:
        type: string
      faculty_id:
        type: integer
      id:
        type: integer
      image_url:
        type: string
      is_pinned:
        type: boolean
      location:
        type: string
      rejection_reason:
        type: string
      scope:
        type: string
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  models.RegisterInput:
    properties:
      email:
        type: string
      faculty_id:
        type: integer
      password:
        minLength: 6
        type: string
    required:
    - email
    - faculty_id
    - password
    type: object
  models.RejectContentInput:
    properties:
      reason:
        maxLength: 1000
        minLength: 3
        type: string
    required:
    - reason
    type: object
  models.Report:
    properties:
      created_at:
        type: string
      id:
        type: integer
      reason:
        type: string
      reporter_id:
        type: integer
      review_note:
        type: string
      reviewed_at:
        type: string
      reviewed_by:
        type: integer
      status:
        type: string
      target_author_id:
        type: integer
      target_post_id:
        type: integer
      target_title:
        type: string
      target_type:
        type: string
      updated_at:
        type: string
    type: object
  models.UpdateEventInput:
    properties:
      capacity:
        maximum: 10000
        minimum: 1
        type: integer
      description:
        maxLength: 5000
        minLength: 10
        type: string
      event_date:
        type: string
      faculty_id:
        type: integer
      image_url:
        type: string
      location:
        maxLength: 255
        minLength: 3
        type: string
      scope:
        enum:
        - faculty
        - global
        type: string
      title:
        maxLength: 255
        minLength: 3
        type: string
    required:
    - capacity
    - description
    - event_date
    - location
    - title
    type: object
  models.UpdatePostInput:
    properties:
      content:
        maxLength: 5000
        minLength: 10
        type: string
      faculty_id:
        type: integer
      image_url:
        type: string
      is_pinned:
        type: boolean
      scope:
        enum:
        - faculty
        - global
        type: string
      title:
        maxLength: 255
        minLength: 3
        type: string
    required:
    - content
    - title
    type: object
  models.UpdateProfileInput:
    properties:
      email:
        type: string
      faculty_id:
        type: integer
    type: object
